<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebHeroes</title>
  <link rel="stylesheet" href="../static/css/game.css">
  <script src="https://cdn.socket.io/4.5.1/socket.io.min.js"></script>
</head>
<body>
<div id="app">

  <!--Header-->
  <header id="game-header">
    <h1>WebHeroes</h1>
    <span id="turn-banner">Waiting for game data…</span>
    <div class="header-controls">
      <button class="btn-sm" id="btn-toggle-numbers">Numbers</button>
      <button class="btn-sm" id="btn-toggle-outer">Ocean</button>
    </div>
  </header>

  <!-- Left sidebar: players + dice-->
  <aside class="sidebar" id="sidebar-left">
    <div class="sidebar-section">
      <div class="sidebar-label">Players</div>
      <div id="players-list">
        <div style="font-size:0.7rem;opacity:0.4;font-style:italic">Loading…</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Last Roll</div>
      <div id="dice-display">
        <span id="dice-label">dice</span>
        <span id="dice-value">—</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Last Gains</div>
      <div id="gain-log"><div style="font-size:0.7rem;opacity:0.3;font-style:italic">None yet</div></div>
    </div>

    <div style="flex:1"></div>

    <div class="sidebar-section">
      <div class="sidebar-label">Legend</div>
      <div id="legend"></div>
    </div>
  </aside>

  <!--Board-->
  <main id="board-area">
    <div id="board-container">
      <svg id="board-svg"></svg>
    </div>
    <div id="placement-hint"></div>
  </main>

  <!--Right sidebar: resources + recipes  -->
  <aside class="sidebar" id="sidebar-right">
    <div class="sidebar-section">
      <div class="sidebar-label">My Resources</div>
      <div id="resources-grid">
        <div style="font-size:0.7rem;opacity:0.4;font-style:italic;grid-column:span 2">Loading…</div>
      </div>
    </div>

    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <div class="sidebar-label">Build</div>
      <div id="recipes-list">
        <div style="font-size:0.7rem;opacity:0.4;font-style:italic">Loading…</div>
      </div>
    </div>

    <button id="btn-end-turn" disabled>End Turn</button>
  </aside>

</div>

<div class="tooltip" id="tooltip"></div>

<!--Game Over / Victory Overlay -->
<div id="game-over-overlay" role="dialog" aria-modal="true" aria-labelledby="game-over-headline">
  <canvas id="game-over-particles"></canvas>
  <div class="game-over-card">
    <div class="game-over-medallion" id="game-over-medallion">⚔️</div>
    <div class="game-over-eyebrow" id="game-over-eyebrow">Campaign Ended</div>
    <div class="game-over-headline" id="game-over-headline">Game Over</div>
    <div class="game-over-divider"></div>
    <div class="game-over-winner-name" id="game-over-winner-name"></div>
    <div class="game-over-sub"    id="game-over-sub"></div>
    <div class="game-over-actions">
      <button class="btn-return-lobbies" id="btn-return-lobbies">
        ⚑ Return to Lobbies
      </button>
    </div>
    <div class="game-over-seal">✦ Web Heroes ✦</div>
  </div>
</div>

<script src="../static/js/game.js"></script>
<script>
  const $ = id => document.getElementById(id);

  //Players panel
  function renderPlayers(players, currentIndex, myIndex) {
    const list = $("players-list");
    list.innerHTML = "";
    players.forEach((p, i) => {
      const card = document.createElement("div");
      card.className = "player-card" +
        (i === currentIndex ? " active" : "") +
        (i === myIndex      ? " mine"   : "");

      const swatch = document.createElement("div");
      swatch.className = "player-swatch";
      const c = p.color_type;
      swatch.style.background = c ? `rgb(${c.r},${c.g},${c.b})` : "#888";

      const name = document.createElement("div");
      name.className = "player-name";
      name.textContent = c?.display_name || `Player ${i + 1}`;

      card.appendChild(swatch);
      card.appendChild(name);

      if (i === currentIndex) {
        const pip = document.createElement("div");
        pip.className = "turn-pip";
        card.appendChild(pip);
      }

      list.appendChild(card);
    });
  }

  //Resources panel
  function renderResources(resources) {
    console.log("[game.html] renderResources called with:", resources);
    const grid = $("resources-grid");
    grid.innerHTML = "";
    if (!resources || !Object.keys(resources).length) {
      grid.innerHTML = '<div style="font-size:0.7rem;opacity:0.4;font-style:italic;grid-column:span 2">None</div>';
      return;
    }
    for (const [name, amount] of Object.entries(resources)) {
      const chip = document.createElement("div");
      chip.className = "resource-chip";
      chip.innerHTML = `<span class="resource-name">${name}</span><span class="resource-amount">${amount}</span>`;
      grid.appendChild(chip);
    }
  }

  //Recipes panel
  let _activeRecipeBtn = null;

  function renderRecipes(recipes, myResources, isMyTurn) {
    const list = $("recipes-list");
    list.innerHTML = "";
    if (!recipes?.length) {
      list.innerHTML = '<div style="font-size:0.7rem;opacity:0.4;font-style:italic">No recipes</div>';
      return;
    }

    for (const recipe of recipes) {
      const resultType = recipe.result?.object_type?.includes("road")       ? "road"
                       : recipe.result?.object_type?.includes("settlement") ? "settlement"
                       : null;
      if (!resultType) continue;

      const canAfford = isMyTurn && recipe.ingredients.every(
        ing => (myResources?.[ing.resource] ?? 0) >= ing.amount
      );

      const btn = document.createElement("button");
      btn.className = "recipe-btn";
      btn.disabled = !canAfford;

      const costStr = recipe.ingredients.map(i => `${i.amount} ${i.resource}`).join(", ");

      btn.innerHTML = `
        <span class="recipe-title">${recipe.result?.display_name || recipe.display_name}</span>
        <span class="recipe-cost">${costStr || "free"}</span>
      `;

      btn.addEventListener("click", () => {
        if (_activeRecipeBtn === btn) {
          // Second click = cancel
          btn.classList.remove("active-placement");
          _activeRecipeBtn = null;
          window.GameUI?.cancelBuild();
          return;
        }
        if (_activeRecipeBtn) _activeRecipeBtn.classList.remove("active-placement");
        btn.classList.add("active-placement");
        _activeRecipeBtn = btn;
        window.GameUI?.startBuild(recipe.name, resultType);
      });

      list.appendChild(btn);
    }
  }

  //Dice display
  function showDice(num) {
    const el = $("dice-value");
    el.textContent = num ?? "—";
    el.className = (num === 6 || num === 8) ? "hot" : "";
  }

  //Turn banner
  function updateTurnBanner(players, currentIndex, myIndex) {
    const banner = $("turn-banner");
    if (!players?.length) { banner.textContent = "Waiting…"; return; }
    const active = players[currentIndex];
    const name   = active?.color_type?.display_name || `Player ${currentIndex + 1}`;
    banner.textContent = currentIndex === myIndex
      ? "⚔ Your Turn"
      : `${name}'s Turn`;
  }

  //End Turn button 
  $("btn-end-turn").addEventListener("click", () => {
    const socket = window._gameSocket;
    if (!socket) return;
    socket.emit("game-management:end-turn");
  });

  // ── Hook into GameEvents from game.js
  // game.js dispatches CustomEvents on window so this file stays decoupled.
  window.addEventListener("game:data", (e) => {
    const { players, currentUserIndex, myIndex, recipes, myResources } = e.detail;
    const isMyTurn = currentUserIndex === myIndex;

    renderPlayers(players, currentUserIndex, myIndex);
    renderResources(myResources);
    renderRecipes(recipes, myResources, isMyTurn);
    updateTurnBanner(players, currentUserIndex, myIndex);
    $("btn-end-turn").disabled = !isMyTurn;
  });

  window.addEventListener("game:end-turn", (e) => {
    const { rolledNumber, nextUserIndex, myIndex, players, myResources, gains, recipes } = e.detail;
    const isMyTurn = nextUserIndex === myIndex;
    showDice(rolledNumber);
    renderPlayers(players, nextUserIndex, myIndex);
    renderResources(myResources);
    renderRecipes(recipes, myResources, isMyTurn);
    updateTurnBanner(players, nextUserIndex, myIndex);
    $("btn-end-turn").disabled = !isMyTurn;
    renderGainLog(gains, players, myIndex);
  });

  function renderGainLog(gains, players, myIndex) {
    const log = $("gain-log");
    if (!gains || !Object.keys(gains).length) return;

    // Clear "None yet" placeholder on first real entry
    if (log.querySelector('[style*="opacity:0.3"]')) log.innerHTML = "";

    for (const [playerIndexStr, playerGains] of Object.entries(gains)) {
      const idx    = Number(playerIndexStr);
      const player = players?.[idx];
      const color  = player?.color_type
        ? `rgb(${player.color_type.r},${player.color_type.g},${player.color_type.b})`
        : "#ccc";
      const who    = idx === myIndex ? "You" : (player?.color_type?.display_name || `Player ${idx + 1}`);
      const gained = Object.entries(playerGains)
        .map(([res, amt]) => `+${amt} ${res}`)
        .join(", ");

      const entry = document.createElement("div");
      entry.className = "gain-entry";
      entry.innerHTML = `<span class="gain-who" style="color:${color}">${who}</span> gained ${gained}`;
      log.prepend(entry);  // newest first
    }

    // Keep log from growing unbounded
    while (log.children.length > 12) log.removeChild(log.lastChild);
  }

  window.addEventListener("game:build-placed", () => {
    // Exit any active recipe button highlight
    if (_activeRecipeBtn) {
      _activeRecipeBtn.classList.remove("active-placement");
      _activeRecipeBtn = null;
    }
  });
</script>
</body>
</html>
